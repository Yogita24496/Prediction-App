name: Robust CI/CD Pipeline

on:
  push:
    branches: [master, predictionapp]
  pull_request:
    branches: [master, predictionapp]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: ['client', 'server']  # Runs for both frontend and backend
    defaults:
      run:
        working-directory: ./${{ matrix.project }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Verify lock file consistency
        run: |
          if ! npm ls --parseable &> /dev/null; then
            echo "Lock file is inconsistent with package.json, regenerating..."
            rm -rf node_modules
            npm install
            git config --global user.email "ci@example.com"
            git config --global user.name "CI Bot"
            git add package-lock.json
            git commit -m "CI: Update package-lock.json" || echo "No lock file changes to commit"
          fi

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit || npm install

      - name: Run build
        if: matrix.project == 'client'  # Only run build for frontend
        run: npm run build

      - name: Run tests
        run: npm test -- --watchAll=false
