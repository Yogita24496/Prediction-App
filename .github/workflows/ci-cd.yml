name: Prediction App CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  react:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./client
        run: npm install

      - name: Run build
        working-directory: ./client
        run: npm run build

      - name: Run tests
        working-directory: ./client
        run: npm test -- --watchAll=false

  node:
    runs-on: ubuntu-latest
    needs: react  # optional - remove if you want parallel execution

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./server
        run: npm install

      - name: Run tests
        working-directory: ./server
        run: npm test

      - name: Start server and test API
        working-directory: ./server
        run: |
          npm start &
          sleep 10
          npm run test:api