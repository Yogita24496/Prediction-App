name: Full-Stack CI/CD

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:
  client:
    name: Build and Test Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'
          
      - name: Install client dependencies
        run: npm ci
        working-directory: ./client
        
      - name: Run client build
        run: npm run build
        working-directory: ./client
        
      - name: Run client tests
        run: npm test -- --watchAll=false
        working-directory: ./client

  server:
    name: Build and Test Server
    needs: client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
          
      - name: Install server dependencies
        run: npm ci
        working-directory: ./server
        
      - name: Run server tests
        run: npm test
        working-directory: ./server
        
      - name: Build Docker images
        run: |
          docker build -t client-app -f ./client/Dockerfile ./client
          docker build -t server-app -f ./server/Dockerfile ./server
        
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/master'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
          
      - name: Push to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag client-app ${{ secrets.DOCKER_USERNAME }}/weather-client:latest
          docker tag server-app ${{ secrets.DOCKER_USERNAME }}/weather-server:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/weather-client:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/weather-server:latest
          