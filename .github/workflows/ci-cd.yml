name: React and Node.js CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      # Install React dependencies
      - name: Install React dependencies
        working-directory: ./client  # adjust if your React app is in a different directory
        run: |
          npm ci --no-audit
          npm rebuild node-sass  # only if you use node-sass

      # Run React build
      - name: Run React build
        working-directory: ./client
        run: npm run build

      # Run React tests
      - name: Run React tests
        working-directory: ./client
        run: npm test -- --watchAll=false --ci

      # Node.js steps (if applicable)
      - name: Install Node.js dependencies
        working-directory: ./server  # adjust to your server directory
        run: npm ci --no-audit

      - name: Run Node.js tests
        working-directory: ./server
        run: npm test
