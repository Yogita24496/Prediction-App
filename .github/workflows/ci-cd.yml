name: Prediction App CI/CD

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

jobs:
  # Test and build client (React)
  client-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'
          
      - name: Install client dependencies
        run: npm ci
        
      - name: Run client tests
        run: npm test -- --coverage --watchAll=false
        
      - name: Build client
        run: npm run build
        
      - name: Upload client build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/build/

  # Test and build server (Node.js)
  server-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './server/package-lock.json'
          
      - name: Install server dependencies
        run: npm ci
        
      - name: Run server tests
        run: npm test
        env:
          NODE_ENV: test
          
      - name: Run linting
        run: npm run lint || echo "No lint script found"
        
  # Docker build and push
  docker-build:
    needs: [client-build, server-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and push client Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/prediction-app-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Build and push server Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/prediction-app-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy (optional - adjust based on your deployment target)
  deploy:
    needs: [docker-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Deploy to production
        run: |
          docker tag client-app ${{ secrets.DOCKER_USERNAME }}/weather-client:latest
          docker tag server-app ${{ secrets.DOCKER_USERNAME }}/weather-server:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/weather-client:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/weather-server:latest
    
